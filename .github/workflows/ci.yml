name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate backend imports
        run: |
          python -m compileall app

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  api-tests:
    name: Manual API scripts smoke run
    runs-on: ubuntu-latest
    needs:
      - backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: budget_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d budget_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r tests_manual/requirements.txt

      - name: Start backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/budget_db
          JWT_SECRET_KEY: ci_secret_key
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "60"
          CORS_ORIGINS: '["http://localhost:3000"]'
        run: |
          python -m uvicorn backend.app.main:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &
          echo $! > backend.pid
          sleep 10

      - name: Run API scripts
        run: |
          python tests_manual/test_auth.py
          python tests_manual/test_users.py
          python tests_manual/test_categories.py
          python tests_manual/test_operations.py
          python tests_manual/test_budget.py
          python tests_manual/test_dashboard.py

      - name: Show backend log on failure
        if: failure()
        run: cat backend.log
